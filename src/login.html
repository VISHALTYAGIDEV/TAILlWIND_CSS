  <link href="./output.css" rel="stylesheet">

<body class="bg-gray-800 flex justify-center items-center min-h-screen">
<div class="bg-gray-600 p-8 shadow-2xl max-w-sm w-full rounded-lg">

<div class="mb-6">
    <label class="font-bold block mb-2 text-sm text-gray-900 ">Email:</label>
    <!-- focus:outline none se jab input par click karenge tab koi nhi border nahi aayega us par -->

</div>
<div class="mb-6">
    <label for="" class="font-bold block mb-2 text-sm text-gray-900">Password:</label>
    <input  class= " bg-gray-400 rounded-md border-gray-700 focus:outline-none px-3 py-2 w-full text-black " type="Password" placeholder="Password">
</div>
<button class="w-full bg-blue-500 py-2 rounded-md text-gray-900  hover:bg-blue-600 shadow-2xl" type="submit">login</button>



</div>
